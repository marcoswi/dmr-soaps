<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMRSoaps</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div class="border-container">
    <div class="border" id="border">
        <div id="header" class="header">
            <div class="header-logo">
                <img class="logo" src="/assets/images/dmr_logo.png" alt="DMR Soaps logo">
            </div>
            <div class="header-navbar">
                <div class="navbar-icon" id="navbar-icon">&#9776;</div>
                <ul class="navbar-ul" id="navbar-ul">
                    <li class="navbar-li"><a href="index.html">HOME</a></li>
                    <li class="navbar-li"><a href="products.html">PRODUCTS</a></li>
                    <li class="navbar-li"><a href="contact.html">CONTACT</a></li>
                </ul>
            </div>
            <div class="shopping-cartButton-container">
                <button class="shopping-cart-button" id="shopping-cart-button">
                    <img class="shopping-cart-img" src="/assets/images/shopping-cart.png" alt="shopping cart">
                    <p id="shopping-cart-button-quantity">0</p>
                </button>
            </div>

        </div>
        <div class="main-section">
            <div class="title">
                <h2>Natural</h2>
                <h1>SOAP</h1>
                <h3>Shop</h3>
            </div>
            <div class="main-image">
                <img id="main-image" src="/assets/images/main-photo-desktop.png" alt="soap on a roap image">
            </div>
            <div class="home-social-media">
                <ul class="home-social-media-ul">
                    <li><a href="https://www.instagram.com/dmr.soaps/" target="_blank"><img class="social-media-icon" src="/assets/social-media/instagram.png" alt="instagram logo"></a></li>
                    <li><a href="https://www.facebook.com/raikesdaniela/" target="_blank"><img class="social-media-icon"src="/assets/social-media/facebook.png" alt="facebook logo"></a></li>
                </ul>
            </div>
        </div>

        <div class="main-carrousel">
            <!-- Previous Button  -->
            <button id="previous-button"  class="carrousel-button">
                <img src="/assets/images/icons8-atrás-50.png" name="previous-button" alt="previous button">
            </button>
            <!-- Carrousel product -->
            <div id="carrousel-product" class="carrousel-product">
                <!-- Product img -->
                <div id="product-img" class="product-img"></div>
                <!-- Product info -->
                <div id="product-info" class="product-info">
                    <!-- Product name -->
                    <div id="product-name" class="product-name"></div>
                    <!-- Product description -->
                    <div id="product-description" class="product-description"></div>
                </div>  
            </div>
            <!-- Next Button  -->
            <button id="next-button" name="next-button" class="carrousel-button">
                <img src="/assets/images/icons8-adelante-100.png" name="next-button" alt="next button">
            </button>
        </div>

    </div>
</div>

<script type="module" src="JS/index-carrousel.js"></script>
<script type="module" src="JS/home-main-img-resizing.js"></script>
<script type="module" src="JS/header-menu-burgerIcon.js"></script>
<script type="module" src="JS/shopping-cart.js"></script>

</body>
</html>
